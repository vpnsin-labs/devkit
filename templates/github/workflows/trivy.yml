name: Trivy

# Scans the repo's dependencies, IaC/config and committed secrets, and uploads
# results to GitHub code scanning (Security tab). Works on any repo — no
# container image required.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: '0 7 * * 1' # weekly, Mondays 07:00 UTC

permissions:
  contents: read

# Auto-cancel superseded runs on the same ref to save Actions minutes (metered on private repos).
concurrency:
  group: trivy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Filesystem scan
    runs-on: ubuntu-latest
    # Hard cap so a hung scan can't drain the Actions minute quota (metered on private repos).
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload results to code scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy
