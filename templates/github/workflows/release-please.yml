name: Release Please

# Maintains a release PR from Conventional Commits; merging it bumps the version
# in package.json, updates CHANGELOG.md, and creates a GitHub release + git tag.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# Serialize release runs per ref; never cancel one mid-flight (cancel-in-progress: false).
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    # Hard cap so a hung job can't drain the Actions minute quota (metered on private repos).
    timeout-minutes: 10
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
