name: Lighthouse

# Lighthouse CI on pull requests — performance, accessibility, best-practices
# and SEO. Builds the app, serves it, audits the URLs in lighthouserc.json, and
# posts a public report link in the run logs.
# Opt-in: NOT installed by `devkit init` unless you pass --lighthouse.
on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

# Auto-cancel superseded runs on the same ref to save Actions minutes (metered on private repos).
concurrency:
  group: lighthouse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    # Hard cap so a hung job can't drain the Actions minute quota (metered on private repos).
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
