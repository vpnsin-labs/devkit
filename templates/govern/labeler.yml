# Config for actions/labeler@v5 — path-based PR labelling.
# Copy to .github/labeler.yml and pair with a workflow that runs labeler on
# pull_request_target. Matches devkit's label taxonomy.
#
# Syntax: each label maps to match rules. `changed-files` + `any-glob-to-any-file`
# labels a PR when ANY changed file matches ANY listed glob.

'type: docs':
  - changed-files:
      - any-glob-to-any-file: ['**/*.md', 'docs/**']

'type: chore':
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'
          - '**/*.config.*'
          - 'package.json'
          - '.nvmrc'
          - '.npmrc'

'dependencies':
  - changed-files:
      - any-glob-to-any-file: ['package-lock.json', 'pnpm-lock.yaml', 'yarn.lock']

'area: api':
  - changed-files:
      - any-glob-to-any-file: ['src/routes/**', 'src/api/**']

'area: ci':
  - changed-files:
      - any-glob-to-any-file: ['.github/workflows/**']
