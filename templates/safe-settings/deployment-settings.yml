# Runtime restriction file for the safe-settings GitHub App.
#
# IMPORTANT: this file lives where the APP RUNS (its deployment), NOT inside the
# admin repo's .github directory. It controls which repos safe-settings is
# allowed to manage, and defines optional custom validators.
#
# If absent, safe-settings excludes only: admin, .github, safe-settings.

restrictedRepos:
  # Only manage repos matching these globs…
  include:
    - '.*'
  # …never touch these (the admin/config repos themselves):
  exclude:
    - admin
    - .github
    - safe-settings

