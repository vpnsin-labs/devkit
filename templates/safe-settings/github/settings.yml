# Org-level safe-settings config — applies to EVERY repo in the org as defaults.
# Lives in the central admin repo at .github/settings.yml (default branch only).
# Suborg files (.github/suborgs/*.yml) and repo files (.github/repos/<repo>.yml)
# override these. Precedence: repo > suborg > org.
#
# Docs: https://github.com/github/safe-settings
# NOTE: the top-level repo-settings key is `repository:` (singular) — this is what
# every official sample and the running code use. Do not use `repositories:`.

# ── Repository defaults (squash-only, clean history, low surface) ────────────
repository:
  has_issues: true
  has_projects: false
  has_wiki: false
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: false
  allow_auto_merge: true
  delete_branch_on_merge: true
  allow_update_branch: true
  squash_merge_commit_title: PR_TITLE
  squash_merge_commit_message: PR_BODY
  web_commit_signoff_required: true
  default_branch: main
  # Dependency graph + Dependabot (free on every repo):
  security:
    enableVulnerabilityAlerts: true
    enableAutomatedSecurityFixes: true

# ── Labels (include = desired; exclude = regex of labels never to delete) ────
labels:
  include:
    # type
    - name: 'type: bug'
      color: 'd73a4a'
      description: "Something isn't working"
    - name: 'type: feature'
      color: 'a2eeef'
      description: 'New feature or request'
    - name: 'type: docs'
      color: '0075ca'
      description: 'Documentation improvements or additions'
    - name: 'type: chore'
      color: 'fef2c0'
      description: 'Maintenance, tooling, or housekeeping'
    # priority
    - name: 'priority: P0'
      color: 'b60205'
      description: 'Critical — drop everything'
    - name: 'priority: P1'
      color: 'd93f0b'
      description: 'High priority'
    - name: 'priority: P2'
      color: 'fbca04'
      description: 'Medium priority'
    - name: 'priority: P3'
      color: '0e8a16'
      description: 'Low priority'
    # status
    - name: 'status: triage'
      color: 'ededed'
      description: 'Needs triage'
    - name: 'status: blocked'
      color: '000000'
      description: 'Blocked by a dependency or decision'
    - name: 'status: in-progress'
      color: '1d76db'
      description: 'Actively being worked on'
    # size
    - name: 'size: S'
      color: 'c2e0c6'
      description: 'Small effort'
    - name: 'size: M'
      color: 'fbca04'
      description: 'Medium effort'
    - name: 'size: L'
      color: 'd93f0b'
      description: 'Large effort'
    # community
    - name: 'good first issue'
      color: '7057ff'
      description: 'Good for newcomers'
    - name: 'help wanted'
      color: '008672'
      description: 'Extra attention is needed'
    # cross-cutting
    - name: 'dependencies'
      color: '0366d6'
      description: 'Updates a dependency file'
    - name: 'security'
      color: 'ee0701'
      description: 'Security-impacting issue or fix'
  exclude:
    - name: ^release # never delete release-* labels created by tooling

# ── Teams (slugs must already exist in the org; permission grants repo access) ─
teams:
  - name: maintainers
    permission: admin
  - name: engineers
    permission: push
  - name: triage
    permission: triage

# ── Classic branch protection ────────────────────────────────────────────────
# Prefer the org-level `rulesets` block below; keep ONE of the two to avoid
# overlapping/confusing merge blocks. `name: default` targets each repo's default
# branch. Every protection sub-block you don't want must be null.
branches:
  - name: default
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1 # bump to 2 for OpenSSF 10/10
        dismiss_stale_reviews: true
        require_code_owner_reviews: true
        require_last_push_approval: false
      required_status_checks:
        strict: true
        checks:
          - context: '{{EXTERNALLY_DEFINED}}' # preserve UI/CI-defined required checks
      enforce_admins: false
      required_linear_history: true
      allow_force_pushes: false
      allow_deletions: false
      required_conversation_resolution: true
      restrictions: null

# ── Org-targeted rulesets (modern, recommended) ──────────────────────────────
# These apply org-wide and are NOT inherited by suborg/repo configs. Ruleset
# vocabulary differs from branch protection (require_code_owner_review singular,
# strict_required_status_checks_policy, integration_id). Comment out the
# `branches:` block above if you adopt rulesets to avoid double enforcement.
rulesets:
  - name: default-branch-protection
    target: branch
    enforcement: active # 'evaluate' (audit) is org-owned repos only
    bypass_actors:
      - actor_id: 1
        actor_type: OrganizationAdmin
        bypass_mode: always
    conditions:
      ref_name:
        include: ['~DEFAULT_BRANCH']
        exclude: []
      repository_name: # ORG-LEVEL ONLY
        include: ['~ALL']
        exclude: []
        protected: true
    rules:
      - type: deletion
      - type: non_fast_forward
      - type: required_linear_history
      - type: pull_request
        parameters:
          required_approving_review_count: 1
          dismiss_stale_reviews_on_push: true
          require_code_owner_review: true
          require_last_push_approval: false
          required_review_thread_resolution: true
      - type: required_status_checks
        parameters:
          strict_required_status_checks_policy: true
          required_status_checks: []
      # Opt in for the strictest profile:
      # - type: required_signatures
