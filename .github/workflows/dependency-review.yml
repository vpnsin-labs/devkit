name: Dependency Review

# Flags vulnerable or disallowed dependencies introduced in a pull request.
# (GitHub Advanced Security — free on public repos.)
on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

# Auto-cancel superseded runs on the same ref to save Actions minutes (metered on private repos).
concurrency:
  group: dependency-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    # Hard cap so a hung job can't drain the Actions minute quota (metered on private repos).
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
